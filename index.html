<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #item-count {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    #new-item {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #new-item:focus { border-color: #4f46e5; }

    #add-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s;
      line-height: 1;
    }

    #add-btn:hover { background: #4338ca; }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      border: 1.5px solid #d1d5db;
      background: #fff;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #6b7280;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    #clear-done {
      margin-left: auto;
      border: 1.5px solid #fca5a5;
      background: #fff;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #ef4444;
      transition: all 0.15s;
    }

    #clear-done:hover { background: #fef2f2; }

    #list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
    }

    #list:empty::after {
      content: '아이템을 추가해보세요!';
      display: block;
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      animation: slideIn 0.2s ease;
      transition: background 0.15s;
    }

    .item:hover { background: #fafafa; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.2s;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>쇼핑 리스트</h1>
      <div id="item-count">0개 항목</div>
    </header>

    <div class="input-area">
      <input id="new-item" type="text" placeholder="아이템 입력 후 Enter 또는 + 클릭" autocomplete="off">
      <button id="add-btn" title="추가">+</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="todo">미완료</button>
      <button class="filter-btn" data-filter="done">완료</button>
      <button id="clear-done">완료 삭제</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list_v1';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let filter = 'all';

    const listEl    = document.getElementById('list');
    const input     = document.getElementById('new-item');
    const addBtn    = document.getElementById('add-btn');
    const countEl   = document.getElementById('item-count');
    const filterBtns = document.querySelectorAll('.filter-btn[data-filter]');
    const clearBtn  = document.getElementById('clear-done');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function updateCount() {
      const done = items.filter(i => i.done).length;
      const total = items.length;
      countEl.textContent = total === 0
        ? '0개 항목'
        : `${total}개 항목 (완료 ${done}개)`;
    }

    function render() {
      listEl.innerHTML = '';
      const visible = items.filter(item =>
        filter === 'all' ? true :
        filter === 'done' ? item.done :
        !item.done
      );

      visible.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');
        li.dataset.id = item.id;

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.addEventListener('change', () => toggle(item.id));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.addEventListener('click', () => remove(item.id));

        li.append(cb, span, del);
        listEl.appendChild(li);
      });

      updateCount();
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; save(); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    clearBtn.addEventListener('click', () => {
      items = items.filter(i => !i.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
